<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>India Location Finder</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f4f7f6; padding: 40px; }
        .container { max-width: 600px; margin: auto; background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        h2 { color: #2c3e50; text-align: center; }
        input { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 6px; box-sizing: border-box; font-size: 16px; }
        button { width: 100%; padding: 12px; background: #27ae60; color: white; border: none; border-radius: 6px; cursor: pointer; font-size: 16px; transition: 0.3s; }
        button:hover { background: #219150; }
        #results { margin-top: 20px; }
        .village-card { background: #fff; border-left: 5px solid #27ae60; padding: 10px; margin-bottom: 10px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        .meta { font-size: 12px; color: #7f8c8d; text-align: center; margin-top: 15px; }
    </style>
</head>
<body>

<div class="container">
    <h2>🇮🇳 Village Search</h2>
    <input type="text" id="searchInput" placeholder="Type village name (e.g. Ami)...">
    <button onclick="searchVillages()">Search Now</button>

    <div id="results"></div>
    <div id="usage" class="meta"></div>
</div>

<script>
    async function searchVillages() {
        const query = document.getElementById('searchInput').value;
        const resultsDiv = document.getElementById('results');
        const usageDiv = document.getElementById('usage');
        
        resultsDiv.innerHTML = "Searching...";

        try {
            const response = await fetch(`https://india-location-api-4.onrender.com/search?q=${query}`, {
                method: 'GET',
                headers: {
                    'api-key': 'india_loc_Fn08jHdY8bFh7YFhM8-YbA', // Your verified key
                    'Content-Type': 'application/json'
                }
            });

            const data = await response.json();

            if (data.results && data.results.length > 0) {
                resultsDiv.innerHTML = data.results.map(v => `
                    <div class="village-card">
                        <strong>${v.name}</strong><br>
                        <small>${v.district_name}, ${v.state_name}</small>
                    </div>
                `).join('');
                usageDiv.innerText = `Quota Used: ${data.meta.quota_used} | Speed: ${data.meta.took_ms}ms`;
            } else {
                resultsDiv.innerHTML = "No villages found.";
            }
        } catch (error) {
            resultsDiv.innerHTML = "Error connecting to API. Is the server awake?";
            console.error(error);
        }
    }
</script>

</body>
</html>
